<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo AR - Balanceamento Químico</title>
    
    <!-- Bibliotecas de Renderização 3D e AR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <!-- Bibliotecas de Rastreamento de Mão (MediaPipe) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; }
        #canvas-container { position: absolute; width: 100%; height: 100%; z-index: 1; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 0; transform: scaleX(-1); }
        
        /* Interface do Jogo (HUD) */
        #hud-jogo {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.85); color: white; padding: 12px 25px;
            border-radius: 15px; text-align: center; z-index: 10; width: 85%; max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #444;
        }
        h2 { margin: 0 0 5px 0; font-size: 18px; color: #00cbc6; }
        p { margin: 0; font-size: 13px; color: #bbb; }

        /* Painel de Controles Flutuantes (Embaixo) */
        #painel-controles {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 15px;
            width: 90%; max-width: 480px;
        }

        .ajuste-container {
            display: flex; justify-content: space-between; width: 100%; background: rgba(0,0,0,0.75);
            padding: 8px; border-radius: 12px; border: 1px solid #333;
        }

        .controle-bloco { display: flex; flex-direction: column; align-items: center; color: white; width: 22%; }
        .label-comp { font-size: 11px; font-weight: bold; margin-bottom: 4px; }
        .botoes-row { display: flex; align-items: center; gap: 5px; }
        
        .btn-seta {
            background: #333; color: white; border: 1px solid #555; width: 24px; height: 24px;
            border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px;
        }
        .btn-seta:active { background: #00cbc6; }
        .valor-coef { font-size: 16px; font-weight: bold; min-width: 15px; text-align: center; }

        /* Botão de Verificação Principal */
        #btn-verificar {
            background: #218c74; color: white; border: none; padding: 12px 35px;
            font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 80%; transition: 0.2s;
        }
        #btn-verificar:active { transform: scale(0.95); background: #1b7460; }

        /* Mensagem de Feedback de Acerto/Erro */
        #feedback-popup {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            padding: 20px 30px; border-radius: 15px; color: white; font-weight: bold; text-align: center;
            z-index: 20; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-size: 18px;
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- HUD Superior com as Instruções -->
    <div id="hud-jogo">
        <h2>Desafio do Balanceamento</h2>
        <p>Ajuste os coeficientes abaixo e abra a palma da mão para ver.</p>
    </div>

    <!-- Janela Pop-up de Resultado -->
    <div id="feedback-popup"></div>

    <!-- Painel Inferior de Ajustes Estequiométricos -->
    <div id="painel-controles">
        <div class="ajuste-container">
            <div class="controle-bloco">
                <span class="label-comp" style="color:#555;">CH₄</span>
                <div class="botoes-row">
                    <button class="btn-seta" onclick="alterar(0, -1)">-</button>
                    <span id="c0" class="valor-coef">1</span>
                    <button class="btn-seta" onclick="alterar(0, 1)">+</button>
                </div>
            </div>
            <div class="controle-bloco">
                <span class="label-comp" style="color:#ff3f34;">O₂</span>
                <div class="botoes-row">
                    <button class="btn-seta" onclick="alterar(1, -1)">-</button>
                    <span id="c1" class="valor-coef">1</span>
                    <button class="btn-seta" onclick="alterar(1, 1)">+</button>
                </div>
            </div>
            <div class="controle-bloco">
                <span class="label-comp" style="color:#555;">CO₂</span>
                <div class="botoes-row">
                    <button class="btn-seta" onclick="alterar(2, -1)">-</button>
                    <span id="c2" class="valor-coef">1</span>
                    <button class="btn-seta" onclick="alterar(2, 1)">+</button>
                </div>
            </div>
            <div class="controle-bloco">
                <span class="label-comp" style="color:#ff3f34;">H₂O</span>
                <div class="botoes-row">
                    <button class="btn-seta" onclick="alterar(3, -1)">-</button>
                    <span id="c3" class="valor-coef">1</span>
                    <button class="btn-seta" onclick="alterar(3, 1)">+</button>
                </div>
            </div>
        </div>
        
        <button id="btn-verificar" onclick="verificarGabarito()">Verificar Balanceamento</button>
    </div>
    
    <video id="webcam" autoplay playsinline></video>

    <div id="canvas-container">
        <a-scene embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
            <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

            <a-light type="ambient" intensity="0.8"></a-light>
            <a-light type="directional" position="2 4 3" intensity="1.0"></a-light>

            <!-- FILTRO DE REALIDADE AUMENTADA -->
            <a-entity id="filtro-reacao" position="0 0 -2.3" scale="0.4 0.4 0.4" visible="false">
                
                <!-- REAGENTE 1: METANO (CH4) -->
                <a-entity position="-1.5 0 0" rotation="15 35 10">
                    <a-sphere position="0 0 0" radius="0.14" color="#1A1A1A" material="roughness: 0.2;"></a-sphere>
                    <a-entity><a-cylinder position="0 0.11 0" radius="0.016" height="0.22" color="#D8D8D8"></a-cylinder><a-sphere position="0 0.22 0" radius="0.08" color="#FFFFFF"></a-sphere></a-entity>
                    <a-entity rotation="0 0 120"><a-cylinder position="0 0.11 0" radius="0.016" height="0.22" color="#D8D8D8"></a-cylinder><a-sphere position="0 0.22 0" radius="0.08" color="#FFFFFF"></a-sphere></a-entity>
                    <a-entity rotation="60 120 -60"><a-cylinder position="0 0.11 0" radius="0.016" height="0.22" color="#D8D8D8"></a-cylinder><a-sphere position="0 0.22 0" radius="0.08" color="#FFFFFF"></a-sphere></a-entity>
                    <a-entity rotation="-60 120 60"><a-cylinder position="0 0.11 0" radius="0.016" height="0.22" color="#D8D8D8"></a-cylinder><a-sphere position="0 0.22 0" radius="0.08" color="#FFFFFF"></a-sphere></a-entity>
                </a-entity>

                <!-- SINAL DE ADIÇÃO (+) -->
                <a-entity position="-0.85 0 0">
                    <a-box position="0 0 0" width="0.03" height="0.16" depth="0.03" color="#FFFFFF" material="shader: flat;"></a-box>
                    <a-box position="0 0 0" width="0.16" height="0.03" depth="0.03" color="#FFFFFF" material="shader: flat;"></a-box>
                </a-entity>

                <!-- REAGENTE 2: GÁS OXIGÊNIO (O2) -->
                <a-entity position="-0.25 0 0" rotation="0 20 45">
                    <a-sphere position="-0.15 0 0" radius="0.13" color="#CC0000" material="roughness: 0.2;"></a-sphere>
                    <a-sphere position="0.15 0 0" radius="0.13" color="#CC0000" material="roughness: 0.2;"></a-sphere>
                    <a-cylinder position="0 0.03 0" rotation="0 0 90" radius="0.015" height="0.30" color="#D8D8D8"></a-cylinder>
                    <a-cylinder position="0 -0.03 0" rotation="0 0 90" radius="0.015" height="0.30" color="#D8D8D8"></a-cylinder>
                </a-entity>

                <!-- SETA DE REAÇÃO (->) -->
                <a-entity position="0.35 0 0">
                    <a-box position="-0.04 0 0" width="0.15" height="0.02" depth="0.02" color="#FFFFFF" material="shader: flat;"></a-box>
                    <a-cone position="0.05 0 0" radius-bottom="0.05" height="0.08" color="#FFFFFF" rotation="0 0 -90" material="shader: flat;"></a-cone>
                </a-entity>

                <!-- PRODUTO 1: DIÓXIDO DE CARBONO (CO2) -->
                <a-entity position="0.9 0 0" rotation="30 10 0">
                    <a-sphere position="0 0 0" radius="0.14" color="#1A1A1A" material="roughness: 0.2;"></a-sphere>
                    <a-sphere position="-0.24 0 0" radius="0.13" color="#CC0000"></a-sphere>
                    <a-cylinder position="-0.12 0.03 0" rotation="0 0 90" radius="0.015" height="0.24" color="#D8D8D8"></a-cylinder>
                    <a-cylinder position="-0.12 -0.03 0" rotation="0 0 90" radius="0.015" height="0.24" color="#D8D8D8"></a-cylinder>
                    <a-sphere position="0.24 0 0" radius="0.13" color="#CC0000"></a-sphere>
                    <a-cylinder position="0.12 0.03 0" rotation="0 0 90" radius="0.015" height="0.24" color="#D8D8D8"></a-cylinder>
                    <a-cylinder position="0.12 -0.03 0" rotation="0 0 90" radius="0.015" height="0.24" color="#D8D8D8"></a-cylinder>
                </a-entity>

                <!-- SINAL DE ADIÇÃO (+) -->
                <a-entity position="1.45 0 0">
                    <a-box position="0 0 0" width="0.03" height="0.16" depth="0.03" color="#FFFFFF" material="shader: flat;"></a-box>
                    <a-box position="0 0 0" width="0.16" height="0.03" depth="0.03" color="#FFFFFF" material="shader: flat;"></a-box>
                </a-entity>

                <!-- PRODUTO 2: ÁGUA (H2O) -->
                <a-entity position="1.95 0 0" rotation="0 40 0">
                    <a-sphere position="0 0 0" radius="0.13" color="#CC0000" material="roughness: 0.2;"></a-sphere>
                    <a-entity rotation="0 0 52.25"><a-cylinder position="0 -0.11 0" radius="0.016" height="0.22" color="#D8D8D8"></a-cylinder><a-sphere position="0 -0.22 0" radius="0.08" color="#FFFFFF"></a-sphere></a-entity>
                    <a-entity rotation="0 0 -52.25"><a-cylinder position="0 -0.11 0" radius="0.016" height="0.22" color="#D8D8D8"></a-cylinder><a-sphere position="0 -0.22 0" radius="0.08" color="#FFFFFF"></a-sphere></a-entity>
                </a-entity>

            </a-entity>
        </a-scene>
    </div>

    <script>
        // Array de controle dos coeficientes [CH4, O2, CO2, H2O]
        let coeficientes = [1, 1, 1, 1];
        const gabarito = [1, 2, 1, 2]; // O gabarito correto da combustão

        function alterar(index, valor) {
            let novoValor = coeficientes[index] + valor;
            // Impede coeficientes negativos ou maiores que 9
            if (novoValor >= 1 && novoValor <= 9) {
                coeficientes[index] = novoValor;
                document.getElementById(`c${index}`).innerText = novoValor;
            }
        }

        function verificarGabarito() {
            const popup = document.getElementById('feedback-popup');
            popup.style.display = 'block';
            
            // Verifica se a array do aluno bate com a array resposta
            let acertou = coeficientes.every((val, index) => val === gabarito[index]);

            if (acertou) {
                popup.style.backgroundColor = "rgba(46, 204, 113, 0.95)";
                popup.innerHTML = "🎉 PARABÉNS!<br><span style='font-size:14px; font-weight:normal;'>A reação está perfeitamente balanceada!</span>";
                popup.style.transform = "translate(-50%, -50%) scale(1)";
            } else {
                popup.style.backgroundColor = "rgba(231, 76, 60, 0.95)";
                popup.innerHTML = "❌ AINDA NÃO...<br><span style='font-size:14px; font-weight:normal;'>A quantidade de átomos reagentes e produtos não bate. Conte as esferas e tente de novo!</span>";
                popup.style.transform = "translate(-50%, -50%) scale(1)";
                
                // Fecha o aviso de erro após 3 segundos automaticamente
                setTimeout(() => {
                    popup.style.transform = "translate(-50%, -50%) scale(0.5)";
                    popup.style.display = 'none';
                }, 3500);
            }
        }

        // --- SISTEMA DE RASTREAMENTO DA MÃO ---
        const videoElement = document.getElementById('webcam');
        const filtroReacao = document.getElementById('filtro-reacao');

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();

        function onResults(results) {
            const sceneEl = document.querySelector('a-scene');
            if (sceneEl && sceneEl.renderer) { sceneEl.renderer.setClearColor(0x000000, 0); }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const isHandOpen = landmarks[8].y < landmarks[6].y && landmarks[12].y < landmarks[10].y && landmarks[16].y < landmarks[14].y && landmarks[20].y < landmarks[18].y;

                if (isHandOpen) {
                    const handX = (landmarks[9].x - 0.5) * 2.4; 
                    const handY = (landmarks[9].y - 0.5) * -2.4;
                    filtroReacao.setAttribute('position', `${handX} ${handY} -2.3`);
                    filtroReacao.setAttribute('visible', 'true');
                } else {
                    filtroReacao.setAttribute('visible', 'false');
                }
            } else {
                filtroReacao.setAttribute('visible', 'false');
            }
        }
    </script>
</body>
</html>
