<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtro AR Corrigido - Síntese da Amônia</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        #canvas-container { position: absolute; width: 100%; height: 100%; z-index: 1; }
        
        video { 
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            transform: scaleX(-1); /* Espelha a câmera para ficar natural */
        }
        
        #instrucoes {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7); color: white; padding: 15px 25px;
            border-radius: 20px; text-align: center; z-index: 10; pointer-events: none;
            font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="instrucoes">Abra a palma da mão para ver a reação molecular</div>
    
    <video id="webcam" autoplay playsinline></video>

    <div id="canvas-container">
        <a-scene embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
            
            <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

            <a-entity id="filtro-reacao" position="0 0 -1.8" scale="0.45 0.45 0.45" visible="false">
                
                <a-entity position="-0.7 0 0">
                    <a-sphere position="-0.15 0 0" radius="0.15" color="#0000FF"></a-sphere>
                    <a-sphere position="0.15 0 0" radius="0.15" color="#0000FF"></a-sphere>
                </a-entity>

                <a-entity position="-0.35 0 0">
                    <a-box position="0 0 0" width="0.04" height="0.18" depth="0.04" color="#FFFFFF"></a-box>
                    <a-box position="0 0 0" width="0.18" height="0.04" depth="0.04" color="#FFFFFF"></a-box>
                </a-entity>

                <a-entity position="0 0 0">
                    <a-sphere position="-0.1" 0 0" radius="0.1" color="#FFFFFF"></a-sphere>
                    <a-sphere position="0.1 0 0" radius="0.1" color="#FFFFFF"></a-sphere>
                </a-entity>

                <a-entity position="0.35 0 0">
                    <a-box position="-0.04 0 0" width="0.16" height="0.03" depth="0.03" color="#FFFFFF"></a-box>
                    <a-cone position="0.06 0 0" radius-bottom="0.06" height="0.09" color="#FFFFFF" rotation="0 0 -90"></a-cone>
                </a-entity>

                <a-entity position="0.75 0 0">
                    <a-sphere position="0 0 0" radius="0.15" color="#0000FF"></a-sphere>
                    <a-sphere position="-0.11 -0.1 0.08" radius="0.1" color="#FFFFFF"></a-sphere>
                    <a-sphere position="0.11 -0.1 0.08" radius="0.1" color="#FFFFFF"></a-sphere>
                    <a-sphere position="0 -0.1 -0.13" radius="0.1" color="#FFFFFF"></a-sphere>
                </a-entity>

            </a-entity>
        </a-scene>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const filtroReacao = document.getElementById('filtro-reacao');
        const instrucoes = document.getElementById('instrucoes');

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();

        function onResults(results) {
            const sceneEl = document.querySelector('a-scene');
            if (sceneEl && sceneEl.renderer) {
                sceneEl.renderer.setClearColor(0x000000, 0); 
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                const isHandOpen = 
                    landmarks[8].y < landmarks[6].y &&
                    landmarks[12].y < landmarks[10].y &&
                    landmarks[16].y < landmarks[14].y &&
                    landmarks[20].y < landmarks[18].y;

                if (isHandOpen) {
                    // O mapeamento de coordenadas foi suavizado para que os limites laterais fiquem bem contidos na tela
                    const handX = (landmarks[9].x - 0.5) * 1.8; 
                    const handY = (landmarks[9].y - 0.5) * -1.8;
                    
                    filtroReacao.setAttribute('position', `${handX} ${handY} -1.8`);
                    filtroReacao.setAttribute('visible', 'true');
                    instrucoes.style.display = 'none';
                } else {
                    filtroReacao.setAttribute('visible', 'false');
                }
            } else {
                filtroReacao.setAttribute('visible', 'false');
            }
        }
    </script>
</body>
</html>
