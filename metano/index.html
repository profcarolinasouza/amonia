<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtro AR 3D - Combustão do Metano (BioModel)</title>
    
    <!-- Bibliotecas de Renderização 3D e AR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <!-- Bibliotecas de Rastreamento de Mão (MediaPipe) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        #canvas-container { position: absolute; width: 100%; height: 100%; z-index: 1; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 0; transform: scaleX(-1); }
        #instrucoes {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7); color: white; padding: 15px 25px;
            border-radius: 20px; text-align: center; z-index: 10; pointer-events: none;
            font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="instrucoes">Abra a palma da mão para ver a reação em 3D real</div>
    
    <video id="webcam" autoplay playsinline></video>

    <div id="canvas-container">
        <a-scene embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
            
            <!-- Carregamento dos Modelos 3D Reais das Moléculas -->
            <a-assets>
                <a-asset-item id="mod-ch4" src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/models/gltf/Methane.glb"></a-asset-item>
                <a-asset-item id="mod-o2" src="https://cdn.jsdelivr.net/gh/pmndrs/market-assets@master/contents/oxygen_molecule/model.gltf"></a-asset-item>
                <a-asset-item id="mod-co2" src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/models/gltf/CarbonDioxide.glb"></a-asset-item>
                <a-asset-item id="mod-h2o" src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/models/gltf/Water.glb"></a-asset-item>
            </a-scene>
            
            <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

            <!-- Iluminação ambiente balanceada para os modelos 3D brilharem sem sombras escuras -->
            <a-light type="ambient" intensity="1.2"></a-light>
            <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>

            <!-- CONTAINER DO FILTRO -->
            <a-entity id="filtro-reacao" position="0 0 -2.4" scale="0.45 0.45 0.45" visible="false">
                
                <!-- REAGENTE 1: CH4 (Modelo 3D Computacional Exato) -->
                <a-entity position="-1.5 0 0" gltf-model="#mod-ch4" scale="0.8 0.8 0.8" rotation="0 45 0"></a-entity>

                <!-- Sinal de Adição (+) -->
                <a-entity position="-0.8 0 0">
                    <a-box position="0 0 0" width="0.03" height="0.15" depth="0.03" color="#FFFFFF" material="shader: flat;"></a-box>
                    <a-box position="0 0 0" width="0.15" height="0.03" depth="0.03" color="#FFFFFF" material="shader: flat;"></a-box>
                </a-entity>

                <!-- REAGENTE 2: O2 (Modelo 3D Real de Ligação Dupla) -->
                <a-entity position="-0.2 0 0" gltf-model="#mod-o2" scale="0.7 0.7 0.7"></a-entity>

                <!-- Seta da Reação (->) -->
                <a-entity position="0.35 0 0">
                    <a-box position="-0.04 0 0" width="0.15" height="0.02" depth="0.02" color="#FFFFFF" material="shader: flat;"></a-box>
                    <a-cone position="0.05 0 0" radius-bottom="0.05" height="0.08" color="#FFFFFF" rotation="0 0 -90" material="shader: flat;"></a-cone>
                </a-entity>

                <!-- PRODUTO 1: CO2 (Modelo 3D Linear Perfeito) -->
                <a-entity position="0.9 0 0" gltf-model="#mod-co2" scale="0.8 0.8 0.8"></a-entity>

                <!-- Sinal de Adição (+) -->
                <a-entity position="1.4 0 0">
                    <a-box position="0 0 0" width="0.03" height="0.15" depth="0.03" color="#FFFFFF" material="shader: flat;"></a-box>
                    <a-box position="0 0 0" width="0.15" height="0.03" depth="0.03" color="#FFFFFF" material="shader: flat;"></a-box>
                </a-entity>

                <!-- PRODUTO 2: H2O (Modelo 3D Angular Preciso, Sem Reflexos) -->
                <a-entity position="1.9 0 0" gltf-model="#mod-h2o" scale="0.8 0.8 0.8" rotation="0 90 0"></a-entity>

            </a-entity>
        </a-scene>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const filtroReacao = document.getElementById('filtro-reacao');
        const instrucoes = document.getElementById('instrucoes');

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();

        function onResults(results) {
            const sceneEl = document.querySelector('a-scene');
            if (sceneEl && sceneEl.renderer) {
                sceneEl.renderer.setClearColor(0x000000, 0); 
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                const isHandOpen = 
                    landmarks[8].y < landmarks[6].y &&
                    landmarks[12].y < landmarks[10].y &&
                    landmarks[16].y < landmarks[14].y &&
                    landmarks[20].y < landmarks[18].y;

                if (isHandOpen) {
                    const handX = (landmarks[9].x - 0.5) * 2.5; 
                    const handY = (landmarks[9].y - 0.5) * -2.5;
                    
                    filtroReacao.setAttribute('position', `${handX} ${handY} -2.4`);
                    filtroReacao.setAttribute('visible', 'true');
                    instrucoes.style.display = 'none';
                } else {
                    filtroReacao.setAttribute('visible', 'false');
                }
            } else {
                filtroReacao.setAttribute('visible', 'false');
            }
        }
    </script>
</body>
</html>
